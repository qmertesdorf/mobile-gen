<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <!-- Indigo -> violet vertical gradient (the base wash) -->
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#150b28"/>
      <stop offset="0.55" stop-color="#1a1030"/>
      <stop offset="1"   stop-color="#2d1b4e"/>
    </linearGradient>
    <!-- Warm candle glow -->
    <radialGradient id="candle" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffcf7a" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#ffcf7a" stop-opacity="0"/>
    </radialGradient>
    <!-- Violet arcane glow (enemy summoning area, center-right) -->
    <radialGradient id="summon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#8b4dff" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#8b4dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floorglow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#9a6bff" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#9a6bff" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Base wash -->
  <rect width="1280" height="720" fill="url(#sky)"/>

  <!-- Side pillars of the duelling chamber (faint, atmospheric depth) -->
  <g fill="#241646" opacity="0.85">
    <rect x="0"    y="0" width="120" height="720"/>
    <rect x="1160" y="0" width="120" height="720"/>
  </g>
  <g fill="#2f2056" opacity="0.7">
    <rect x="120"  y="0" width="26" height="720"/>
    <rect x="1134" y="0" width="26" height="720"/>
  </g>
  <!-- Pillar rune bands -->
  <g stroke="#e8c25a" stroke-width="2" opacity="0.18" fill="none">
    <rect x="40" y="150" width="44" height="44" rx="6"/>
    <rect x="40" y="330" width="44" height="44" rx="6"/>
    <rect x="40" y="510" width="44" height="44" rx="6"/>
    <rect x="1196" y="150" width="44" height="44" rx="6"/>
    <rect x="1196" y="330" width="44" height="44" rx="6"/>
    <rect x="1196" y="510" width="44" height="44" rx="6"/>
  </g>

  <!-- Candle flames flanking the chamber -->
  <g>
    <ellipse cx="62"   cy="120" rx="90" ry="120" fill="url(#candle)"/>
    <ellipse cx="1218" cy="120" rx="90" ry="120" fill="url(#candle)"/>
    <circle cx="62"   cy="118" r="5" fill="#ffe6ad"/>
    <circle cx="1218" cy="118" r="5" fill="#ffe6ad"/>
  </g>

  <!-- Violet summoning glow where the enemy stands (center-right ~880,340) -->
  <ellipse cx="880" cy="340" rx="300" ry="300" fill="url(#summon)"/>

  <!-- Glowing floor runic circle (bottom-center, in perspective: wide ellipse) -->
  <g transform="translate(640 634)">
    <ellipse cx="0" cy="0" rx="430" ry="120" fill="url(#floorglow)"/>
    <g stroke="#b48bff" fill="none" filter="url(#soft)">
      <ellipse cx="0" cy="0" rx="380" ry="104" stroke-width="3" opacity="0.45"/>
      <ellipse cx="0" cy="0" rx="300" ry="82"  stroke-width="2" opacity="0.30"/>
      <ellipse cx="0" cy="0" rx="210" ry="58"  stroke-width="2" opacity="0.22"/>
    </g>
    <!-- Runic glyph ticks around the outer ring -->
    <g stroke="#e8c25a" stroke-width="2.5" opacity="0.40">
      <line x1="-380" y1="0"  x2="-352" y2="0"/>
      <line x1="380"  y1="0"  x2="352"  y2="0"/>
      <line x1="0" y1="-104" x2="0" y2="-82"/>
      <line x1="0" y1="104"  x2="0" y2="82"/>
      <line x1="-270" y1="-74" x2="-250" y2="-68"/>
      <line x1="270"  y1="-74" x2="250"  y2="-68"/>
      <line x1="-270" y1="74"  x2="-250" y2="68"/>
      <line x1="270"  y1="74"  x2="250"  y2="68"/>
    </g>
    <!-- Inner sigil cross -->
    <g stroke="#9a6bff" stroke-width="1.5" opacity="0.22">
      <line x1="-210" y1="0" x2="210" y2="0"/>
      <ellipse cx="0" cy="0" rx="60" ry="16" fill="none"/>
    </g>
  </g>

  <!-- Floating arcane motes -->
  <g fill="#cdb6ff">
    <circle cx="240" cy="120" r="2.4" opacity="0.35"/>
    <circle cx="430" cy="220" r="1.8" opacity="0.28"/>
    <circle cx="600" cy="90"  r="2.0" opacity="0.30"/>
    <circle cx="760" cy="170" r="1.6" opacity="0.26"/>
    <circle cx="980" cy="120" r="2.2" opacity="0.32"/>
    <circle cx="1080" cy="240" r="1.7" opacity="0.24"/>
    <circle cx="330" cy="330" r="1.6" opacity="0.22"/>
    <circle cx="540" cy="400" r="2.0" opacity="0.26"/>
    <circle cx="700" cy="300" r="1.5" opacity="0.20"/>
    <circle cx="900" cy="470" r="1.8" opacity="0.24"/>
    <circle cx="1040" cy="430" r="1.6" opacity="0.22"/>
    <circle cx="200" cy="470" r="2.0" opacity="0.26"/>
  </g>
</svg>
