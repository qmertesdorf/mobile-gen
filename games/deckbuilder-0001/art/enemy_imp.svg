<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <defs>
    <radialGradient id="aura" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff7a2e" stop-opacity="0.34"/>
      <stop offset="1" stop-color="#ff7a2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#46306a"/>
      <stop offset="1" stop-color="#281a44"/>
    </linearGradient>
  </defs>
  <ellipse cx="120" cy="128" rx="100" ry="100" fill="url(#aura)"/>
  <!-- Barbed tail -->
  <path d="M150 168 Q188 176 184 142 Q182 124 168 130" fill="none" stroke="#33234f" stroke-width="9" stroke-linecap="round"/>
  <path d="M184 142 l12 -10 l-2 16 z" fill="#ff9a2e"/>
